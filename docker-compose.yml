# NOTE: The GHCR image (ghcr.io/rightnow-ai/openfang) is not yet public.
# For now, build from source using `docker compose up --build`.
# See: https://github.com/RightNow-AI/openfang/issues/12

version: "3.8"
services:
  openfang:
    build: .
    # image: ghcr.io/rightnow-ai/openfang:latest  # Uncomment when GHCR is public
    ports:
      # Bound to localhost only. To expose to the network, change to "0.0.0.0:4200:4200"
      - "127.0.0.1:4200:4200"
    volumes:
      - openfang-data:/data
    # SECURITY: Use Docker secrets instead of environment variables for API keys.
    # Secrets are mounted as files at /run/secrets/<name> and are not exposed
    # via `docker inspect`, /proc/1/environ, or container metadata APIs.
    # To use: create files (e.g. `echo "sk-..." > ./secrets/openai_api_key`)
    # and uncomment the secrets section below.
    #
    # For backward compatibility, environment variables still work — the app
    # checks: Docker secret file > in-process store > env var.
    secrets:
      - anthropic_api_key
      - openai_api_key
      - groq_api_key
      - telegram_bot_token
      - discord_bot_token
      - slack_bot_token
      - slack_app_token
    environment:
      # Fallback: env vars still work if secret files are not provided.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
    restart: unless-stopped

# Docker secrets — create files in ./secrets/ directory.
# Each file contains the raw secret value (no trailing newline).
# Example: echo -n "sk-ant-..." > ./secrets/anthropic_api_key
secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
  openai_api_key:
    file: ./secrets/openai_api_key
  groq_api_key:
    file: ./secrets/groq_api_key
  telegram_bot_token:
    file: ./secrets/telegram_bot_token
  discord_bot_token:
    file: ./secrets/discord_bot_token
  slack_bot_token:
    file: ./secrets/slack_bot_token
  slack_app_token:
    file: ./secrets/slack_app_token

volumes:
  openfang-data:
